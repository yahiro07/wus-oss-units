name: Build bundles branch

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: koodori/package-lock.json

      - name: Install koodori dependencies
        run: npm ci
        working-directory: koodori

      - name: Build dist
        run: bash ./build.sh

      - name: Prepare bundles worktree
        run: |
          if git ls-remote --exit-code --heads origin bundles; then
            git fetch origin bundles
            git worktree add bundles-worktree origin/bundles
          else
            git worktree add --detach bundles-worktree
            cd bundles-worktree
            git switch --orphan bundles
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

      - name: Sync dist into bundles/units
        run: |
          rm -rf bundles-worktree/units
          mkdir -p bundles-worktree/units
          cp -R dist/. bundles-worktree/units/

      - name: Commit and push bundles branch
        run: |
          cd bundles-worktree
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update units bundle"
          git push origin HEAD:bundles